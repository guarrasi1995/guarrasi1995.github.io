name: Update Scholar metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: write

jobs:
  update-scholar-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install updater dependency
        run: python -m pip install scholarly

      - name: Fetch metrics
        run: python scripts/update_scholar_metrics.py

      - name: Commit updated metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Google Scholar metrics"
          file_pattern: _data/scholar_metrics.yml
