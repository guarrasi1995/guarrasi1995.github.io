---
layout: default
---
<!-- page.html -->
<div class="post page-lab page-lab--{{ page.title | slugify }}">

  <header class="page-hero">
    <div class="page-hero__copy">
      <h1 class="post-title">{{ page.title }}</h1>
      <p class="post-description">{{ page.description }}</p>
    </div>
  </header>

  <article class="page-body">
    {{ content }}
  </article>

</div>
